<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
 <h1 style="text-align: center;">STUDENT REGISTRATION FORM</h1>   
 <br/>
 <h2>Personal Details:</h2>
    <label>First Name:</label> 
<input type="text" name="First name" placeholder="Enter your First name" required>
  <br/>
  <br/>
   <label>Last Name:</label> 
<input type="text" name="Last name" placeholder="Enter your Last name" required>
  <br/> <br/>
   <label>Father Name:</label> 
<input type="text" name="Father name" placeholder="Enter your Father name" required>
  <br/>  <br/>
   <label>Age:</label> 
<input type="text" name="Age" placeholder="Enter your Age" required>
  <br/>   <br/>
 <label>Gender:</label>
 <input type="radio" name="gender" value="Male" id="Male">
    <label for="Male">
    <label style="display:inline; margin: 0;">Male</label>
 <input type="radio" name="gender" value="Female" id="Female">
    <label for="Female">
    <label style="display:inline; margin: 0;">Female</label>
 <br/>
 <h2>Contact Details:</h2>
    <label>Email ID:</label> 
<input type="text" name="Email ID" placeholder="Enter your Email ID" required>
  <br/>
  <br/>
   <label>Phone Number:</label> 
<input type="text" name="Phone Number" placeholder="Enter your Phone Number" required>
  <br/> <br/>
   <label>Address:</label> 
<input type="text" name="Address" placeholder="Enter your Address" required>
  <br/>  <br/>
  <div style="text-align: center";>
  <button type="submit">Submit</button>  
  </div>
</body>
</html>
